name: Thematic scan (pré-explosion) — daily EOD

on:
  workflow_dispatch: {}
  schedule:
    - cron: "12 14 * * 1-5"   # 14:12 UTC ≈ 16:12 Paris (ÉTÉ) ≈ 10:12 ET, ~40 min après l'ouverture US.
                              # ⚠️ HIVER : 14:12 UTC = 15:12 Paris = 09:12 ET (AVANT l'ouverture 9:30 ET)
                              #    -> passer à "12 15 * * 1-5" fin octobre pour rester après l'ouverture.

permissions:
  contents: write

concurrency:
  group: thematic-scan-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DEFAULT_BRANCH: main
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure clean working tree
        run: |
          set -euo pipefail
          git fetch origin "$DEFAULT_BRANCH"
          git reset --hard "origin/$DEFAULT_BRANCH"
          git clean -fd

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install yfinance   # sécurité si absent de requirements.txt

      - name: Tests intégrité du score (fail-fast avant tout scan/commit)
        run: python test_pattern_score.py

      - name: Build thematic universe
        run: python build_thematic_universe.py

      - name: Scan pré-explosion (score /100)
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          python scan_thematic.py
          test -f dashboard/public/thematic_setups.csv || (echo "Missing thematic_setups.csv"; exit 1)
          echo "--- head thematic_setups.csv ---"; head -n 8 thematic_setups.csv || true

      - name: Overlay catalyseur (SEC EDGAR 8-K — colonnes séparées, non bloquant)
        env:
          SEC_USER_AGENT: "TradingScan research arnaud.varela@gmail.com"
        run: |
          set -euo pipefail
          python catalyst_fetch.py || echo "[WARN] catalyst non bloquant (SEC indisponible)"

      - name: Overlay news (chaleur sectorielle Google News + buzz Finnhub — non bloquant)
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: |
          set -euo pipefail
          python news_fetch.py || echo "[WARN] news non bloquant"

      - name: Suivi d'outcome (résolution forward + rapport de fiabilité)
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          python track_outcomes.py || echo "[WARN] track_outcomes non bloquant (scan déjà produit)"

      - name: Commit & push outputs
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for f in thematic_setups.csv thematic_universe.csv signals_log.csv score_reliability.csv sector_heat.csv \
                   dashboard/public/thematic_setups.csv dashboard/public/thematic_universe.csv \
                   dashboard/public/signals_log.csv dashboard/public/score_reliability.csv dashboard/public/sector_heat.csv; do
            [ -f "$f" ] && git add "$f" || true
          done
          if git diff --cached --quiet; then
            echo "Aucun changement à committer."; exit 0
          fi
          git commit -m "auto: thematic setups ($(date -u +'%Y-%m-%dT%H:%M:%SZ'))"
          git pull --rebase origin "$DEFAULT_BRANCH"
          git push origin "HEAD:$DEFAULT_BRANCH"
